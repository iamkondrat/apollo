<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Калькулятор Дошки Аполло</title>
  
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">

  <style>
    body { font-family: -apple-system, sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; touch-action: manipulation; }
    
    .sticky-header { background: #1e1e1e; padding: 10px 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-bottom: 2px solid #333; }
    .stats-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
    .stats-row span { color: #4CAF50; font-size: 18px; }

    /* Стилі для розбивки по породах і товщинах */
    .sub-stats {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 90px; /* Обмежуємо висоту, щоб шапка не стала величезною */
      overflow-y: auto; /* Додаємо скрол, якщо позицій багато */
    }
    .sub-stat-row {
      display: flex;
      justify-content: space-between;
      background: #2a2a2a;
      padding: 6px 10px;
      border-radius: 6px;
      border-left: 3px solid #4CAF50; /* Зелена смужка збоку для краси */
    }
    .sub-stat-row span { color: #fff; font-weight: bold; }
    
    .header-btns { display: flex; gap: 10px; }
    .header-btns button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; color: white; transition: background 0.1s; }
    .btn-undo { background: #d32f2f; }
    .btn-undo:active { background: #b71c1c; }
    .btn-menu { background: #1976d2; }
    .btn-menu:active { background: #1565c0; }
    
    #settings-menu { background: #222; padding: 15px; border-bottom: 2px solid #333; display: block; }
    .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    input, select { width: 100%; box-sizing: border-box; padding: 12px; background: #333; color: white; border: 1px solid #444; border-radius: 8px; font-size: 16px; outline: none; appearance: auto; -webkit-appearance: auto; }
    input:focus, select:focus { border-color: #4CAF50; }
    
    .action-btn { width: 100%; padding: 12px; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; transition: background 0.1s; }
    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    .list-btn { background: #f57c00; margin-top: 0; }
    .list-btn:active { background: #e65100; }
    
    /* --- NEW/MODIFIED: Combined direct send button and download button --- */
    .export-btn { background: #1976d2; margin-top: 0; color: white; flex: 2; /* Шире кнопки списка */ }
    .export-btn:active { background: #1565c0; }
    
    .reset-btn { background: #555; margin-top: 10px; }
    .reset-btn:active { background: #444; }
    
    .width-input-area { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
    .width-display { flex: 1; padding: 15px; background: #2c2c2c; color: white; border: 1px solid #444; border-radius: 8px; font-size: 20px; font-weight: bold; outline: none; text-align: center; cursor: default; }
    .width-display::placeholder { color: #888; font-size: 16px; font-weight: normal; }
    .btn-add-board { padding: 15px 25px; background: #4CAF50; color: black; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.1s; }
    .btn-add-board:active { background: #388e3c; transform: translateY(2px); }

    .numpad-container { padding: 15px; }
    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    button.num-btn { background: #333; color: white; border: none; padding: 25px 0; font-size: 28px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: all 0.1s; box-shadow: 0 4px 0 #111; }
    button.num-btn:active, .flash { background: #4CAF50 !important; color: black !important; transform: translateY(4px); box-shadow: 0 0 0 #111 !important; }
    button.clear-btn { background: #d32f2f; color: white; }
    button.clear-btn:active { background: #b71c1c; }
    button.backspace-btn { background: #555; color: white; font-size: 22px; }
    button.backspace-btn:active { background: #444; }

    #list-modal { display: none; background: #2c2c2c; padding: 15px; border-radius: 8px; margin-top: 15px; max-height: 250px; overflow-y: auto; font-size: 14px; }
    .list-item { border-bottom: 1px solid #444; padding: 8px 0; }
    .list-item:last-child { border-bottom: none; }
    .item-price { color: #4CAF50; font-weight: bold; }
    /* Екран завантаження */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85); /* Темний фон */
      z-index: 9999;
      display: none; /* Спочатку прихований */
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .loader-content {
      text-align: center;
    }
    .spinner {
      border: 6px solid #333;
      border-top: 6px solid #4CAF50; /* Зелений колір крутилки */
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #loader-text {
      font-size: 22px;
      font-weight: bold;
      color: white;
    }
    .success-icon {
      font-size: 60px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="loader-content" id="loader-content">
      <div class="spinner"></div>
      <div id="loader-text">Відправлення...</div>
    </div>
  </div>
  
  <div class="sticky-header">
    <div class="stats-row">
      <div><span id="vol">0.000</span> м³</div>
      <div><span id="sum">0</span> грн</div>
      <div><span id="count">0</span> шт</div>
    </div>

    <div id="sub-stats" class="sub-stats"></div>
    
    <div class="header-btns">
      <button class="btn-undo" onclick="undo()">↩ Скасувати</button>
      <button class="btn-menu" id="menu-toggle-btn" onclick="toggleMenu()">⚙️ Приховати налаштування</button>
    </div>
  </div>

  <div id="settings-menu">
    <div class="inputs">
      <!-- --- NEW: Buyer Name Input Field --- -->
      <input type="text" id="buyer-name" placeholder="Покупець">
      <select id="wood-type">
        <option value="" disabled selected>Оберіть породу</option>
        <option value="Сосна">Сосна</option>
        <option value="Вільха">Вільха</option>
        <option value="Липа">Липа</option>
        <option value="Дуб">Дуб</option>
        <option value="Ясен">Ясен</option>
        <option value="Бук">Бук</option>
        <option value="Клен">Клен</option>
        <option value="Черешня">Черешня</option>
        <option value="Горіх">Горіх</option>
        <option value="Берест">Берест</option>
      </select>
      <input type="text" inputmode="decimal" id="price" placeholder="Ціна за куб (грн)">
      <input type="text" inputmode="decimal" id="len" placeholder="Довжина (м)">
      <input type="text" inputmode="decimal" id="thick" placeholder="Товщина (мм)">
    </div>
    <div class="btn-row">
      <button class="action-btn list-btn" onclick="toggleList()">📋 Список дошок</button>
      <!-- --- MODIFIED: Direct send button now handles download too --- -->
      <button class="action-btn export-btn" onclick="sendData()">📥 Надіслати та завантижити</button>
    </div>
    <button class="action-btn reset-btn" onclick="resetAll()">🗑 Скинути все</button>
    <div id="list-modal"></div>
  </div>

  <div class="width-input-area">
    <input type="text" id="width-display" class="width-display" placeholder="Ширина (см)" readonly>
    <button id="add-board-btn" class="btn-add-board" onclick="confirmAddBoard()">ОК</button>
  </div>

  <div class="numpad-container">
    <div class="numpad">
      <button class="num-btn" onclick="pressKey('1')">1</button>
      <button class="num-btn" onclick="pressKey('2')">2</button>
      <button class="num-btn" onclick="pressKey('3')">3</button>
      <button class="num-btn" onclick="pressKey('4')">4</button>
      <button class="num-btn" onclick="pressKey('5')">5</button>
      <button class="num-btn" onclick="pressKey('6')">6</button>
      <button class="num-btn" onclick="pressKey('7')">7</button>
      <button class="num-btn" onclick="pressKey('8')">8</button>
      <button class="num-btn" onclick="pressKey('9')">9</button>
      <button class="num-btn clear-btn" onclick="clearWidthInput()">C</button>
      <button class="num-btn" onclick="pressKey('0')">0</button>
      <button class="num-btn backspace-btn" onclick="pressBackspace()">⌫</button>
    </div>
  </div>

  <script>
    let totalVol = 0;
    let history = []; 
    let currentWidthInput = ""; 

    // Настройка звука
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function playClickSound() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(1, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.connect(gainNode); gainNode.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function loadStoredData() {
      const storedBuyer = localStorage.getItem('apollo_buyer_name');
      const storedWood = localStorage.getItem('apollo_wood_type');
      const storedPrice = localStorage.getItem('apollo_price');
      const storedLen = localStorage.getItem('apollo_len');
      const storedThick = localStorage.getItem('apollo_thick');
      
      const storedHistory = localStorage.getItem('apollo_board_history');
      const storedVol = localStorage.getItem('apollo_total_vol');
      const storedWidth = localStorage.getItem('apollo_current_width'); // ДОДАНО: ширина
      
      if (storedBuyer) document.getElementById('buyer-name').value = storedBuyer;
      if (storedWood) document.getElementById('wood-type').value = storedWood;
      if (storedPrice) document.getElementById('price').value = storedPrice;
      if (storedLen) document.getElementById('len').value = storedLen;
      if (storedThick) document.getElementById('thick').value = storedThick;

      if (storedHistory) history = JSON.parse(storedHistory);
      if (storedVol) totalVol = parseFloat(storedVol);
      
      // Відновлюємо набрану ширину, якщо вона була
      if (storedWidth) {
        currentWidthInput = storedWidth;
        updateWidthDisplay();
      }

      updateUI();
      renderList();
    }
    
    function saveStoredData() {
      localStorage.setItem('apollo_buyer_name', document.getElementById('buyer-name').value);
      localStorage.setItem('apollo_wood_type', document.getElementById('wood-type').value);
      localStorage.setItem('apollo_price', document.getElementById('price').value);
      localStorage.setItem('apollo_len', document.getElementById('len').value);
      localStorage.setItem('apollo_thick', document.getElementById('thick').value);
      
      localStorage.setItem('apollo_board_history', JSON.stringify(history));
      localStorage.setItem('apollo_total_vol', totalVol.toString());
      localStorage.setItem('apollo_current_width', currentWidthInput); // ДОДАНО: збереження ширини
    }

    loadStoredData(); 
    
    // ДОДАНО: Миттєве збереження кожного поля при будь-якій зміні
    document.querySelectorAll('#settings-menu input, #settings-menu select').forEach(el => {
      el.addEventListener('input', saveStoredData);
      el.addEventListener('change', saveStoredData);
    });

    // Numpad Logic
    function updateWidthDisplay() { document.getElementById('width-display').value = currentWidthInput; }
    function pressKey(key) { if (currentWidthInput.length < 2) { currentWidthInput += key; updateWidthDisplay(); saveStoredData(); playClickSound(); } }
    function clearWidthInput() { currentWidthInput = ""; updateWidthDisplay(); saveStoredData(); playClickSound(); }
    function pressBackspace() { currentWidthInput = currentWidthInput.slice(0, -1); updateWidthDisplay(); saveStoredData(); playClickSound(); }

    function toggleMenu() {
      const menu = document.getElementById('settings-menu');
      const btn = document.getElementById('menu-toggle-btn');
      if (menu.style.display === 'none') { menu.style.display = 'block'; btn.innerText = '⚙️ Приховати налаштування'; } 
      else { menu.style.display = 'none'; btn.innerText = '⚙️ Показати налаштування'; }
    }

    function confirmAddBoard() {
      const buyer = document.getElementById('buyer-name').value;
      if (buyer === "") { alert("Будь ласка, вкажіть покупця!"); if(document.getElementById('settings-menu').style.display === 'none') toggleMenu(); return; }
      if (currentWidthInput === "") { alert("Будь ласка, введіть ширину!"); return; }
      const width = parseInt(currentWidthInput);
      if (isNaN(width) || width < 1 || width > 99) { alert("Будь ласка, введіть правильну ширину (1-99 см)!"); clearWidthInput(); return; }
      addBoardFromWidth(width);
      clearWidthInput();
    }

    function getSafeNumber(id) {
      let val = document.getElementById(id).value;
      if (!val) return 0;
      // Видаляємо всі літери/пробіли і міняємо кому на крапку
      val = val.replace(/[^\d.,]/g, '').replace(',', '.');
      return parseFloat(val) || 0;
    }

    function addBoardFromWidth(widthCm) {
      const buyer = document.getElementById('buyer-name').value;
      const wood = document.getElementById('wood-type').value; 
      
      // Використовуємо нашу нову безпечну функцію для зчитування чисел
      const cubePrice = getSafeNumber('price');
      const l = getSafeNumber('len');
      const t = getSafeNumber('thick') / 1000;
      const w = widthCm / 100;
      
      if (buyer === "") { alert("Будь ласка, вкажіть покупця!"); if(document.getElementById('settings-menu').style.display === 'none') toggleMenu(); return; }
      if (wood === "") { alert("Будь ласка, оберіть породу дерева!"); if(document.getElementById('settings-menu').style.display === 'none') toggleMenu(); return; }
      if (cubePrice === 0) { alert("Будь ласка, вкажіть ціну за куб!"); if(document.getElementById('settings-menu').style.display === 'none') toggleMenu(); return; }
      if (l === 0 || t === 0) { alert("Спочатку відкрийте налаштування та вкажіть довжину та товщину дошки!"); if(document.getElementById('settings-menu').style.display === 'none') toggleMenu(); return; }
      
      const boardVol = l * t * w;
      const boardPrice = boardVol * cubePrice; 
      
      history.push({ buyer: buyer, wood: wood, width: widthCm, length: l, thick: getSafeNumber('thick'), vol: boardVol, cubePrice: cubePrice, price: boardPrice });
      totalVol += boardVol;
      updateUI(); renderList(); saveStoredData(); playClickSound(); if(navigator.vibrate) navigator.vibrate(40);
    }
    
    function undo() {
      if (history.length === 0) return;
      
      // Видаляємо останню дошку
      history.pop(); 
      
      // НАДІЙНИЙ ПІДРАХУНОК: Рахуємо об'єм заново по залишених дошках
      totalVol = history.reduce((sum, board) => sum + board.vol, 0);
      
      // ЖОРСТКИЙ ЗАПОБІЖНИК: якщо об'єм менше нуля або мізерно малий — ставимо рівно 0
      if (totalVol < 0.0001) {
        totalVol = 0;
      }
      
      updateUI(); 
      renderList(); 
      saveStoredData(); 
      playClickSound();
    }
    
    async function resetAll() {
      let msg = "Увага! Ви впевнені, що хочете видалити всі заміри та почати заново?";
      
      if (history.length > 0 && history.length !== lastSentCount) {
        msg = "⚠️ У вас є НЕВІДПРАВЛЕНІ дані!\nВи не забули їх відправити?\n\nТочно хочете видалити все БЕЗ збереження в основну базу?";
      }

      if(confirm(msg)) {
        
        // ВІДПРАВЛЯЄМО В "КОШИК" (isSilent = true, isTrash = true)
        // Відправляємо тільки якщо дійсно є щось нове невідправлене
        if (history.length > 0 && history.length !== lastSentCount) {
           await theoryAutoSend(true, true);
        }
        
        totalVol = 0; 
        history = [];
        lastSentCount = 0; 
        
        localStorage.removeItem('apollo_board_history'); 
        localStorage.removeItem('apollo_total_vol');
        localStorage.removeItem('apollo_wood_type'); 
        localStorage.removeItem('apollo_price'); 
        localStorage.removeItem('apollo_len'); 
        localStorage.removeItem('apollo_thick'); 
        localStorage.removeItem('apollo_current_width'); 

        updateUI(); 
        renderList();
        
        document.getElementById('buyer-name').value = ""; 
        document.getElementById('wood-type').value = ""; 
        document.getElementById('price').value = ""; 
        document.getElementById('len').value = ""; 
        document.getElementById('thick').value = ""; 
        
        document.getElementById('list-modal').style.display = 'none'; 
        clearWidthInput();
      }
    }
    
    function updateUI() {
      // 1. Загальні підсумки (залишилися без змін)
      document.getElementById('vol').innerText = totalVol.toFixed(3);
      const totalSum = history.reduce((sum, board) => sum + board.price, 0);
      document.getElementById('sum').innerText = Math.round(totalSum).toLocaleString('uk-UA');
      document.getElementById('count').innerText = history.length;

      // 2. ДОДАНО: Розбивка по породах і товщинах
      const subStatsContainer = document.getElementById('sub-stats');
      if (!subStatsContainer) return; // Захист від помилок

      // Якщо список порожній, очищаємо блок
      if (history.length === 0) {
        subStatsContainer.innerHTML = '';
        return;
      }

      // Групуємо дошки
      const groups = {};
      history.forEach(b => {
        const key = `${b.wood} ${b.thick} мм`;
        if (!groups[key]) {
          groups[key] = { vol: 0, sum: 0, count: 0 };
        }
        groups[key].vol += b.vol;
        groups[key].sum += b.price;
        groups[key].count++;
      });

      // Створюємо HTML для кожної групи
      let subHtml = '';
      for (const [name, data] of Object.entries(groups)) {
        subHtml += `
          <div class="sub-stat-row">
            <div>${name}:</div>
            <div><span>${data.vol.toFixed(3)}</span> м³</div>
            <div><span>${Math.round(data.sum).toLocaleString('uk-UA')}</span> грн</div>
            <div><span>${data.count}</span> шт</div>
          </div>
        `;
      }
      
      // Виводимо на екран
      subStatsContainer.innerHTML = subHtml;
    }

    function toggleList() { const modal = document.getElementById('list-modal'); modal.style.display = modal.style.display === 'block' ? 'none' : 'block'; }
    function renderList() { 
      const modal = document.getElementById('list-modal'); 
      modal.innerHTML = [...history].reverse().map((b, i) => 
        `<div class="list-item">Дошка ${history.length - i} (${b.wood}): ${b.length}м × ${b.thick}мм × ${b.width}см = <b>${b.vol.toFixed(3)} м³</b> <br><span class="item-price">(${Math.round(b.price)} грн / по ${Math.round(b.cubePrice || 0)} грн за куб)</span></div>`
      ).join(''); 
    }

    // --- NEW: Combined send function calls theoretical GAS send and direct download ---
    
    async function sendData() {
      if(history.length === 0) { alert("Список порожній! Спочатку додайте дошки."); return; }
      const buyer = document.getElementById('buyer-name').value;
      if (buyer === "") { alert("Будь ласка, вкажіть покупця перед надсиланням!"); if(document.getElementById('settings-menu').style.display === 'none') toggleMenu(); return; }

      const overlay = document.getElementById('loading-overlay');
      const loaderContent = document.getElementById('loader-content');

      // 1. Показуємо екран завантаження (це блокує планшет від зайвих кліків)
      overlay.style.display = 'flex';
      loaderContent.innerHTML = '<div class="spinner"></div><div id="loader-text">Відправлення...</div>';

      // 2. ВАЖЛИВО: Спочатку відправляємо в хмару!
      // Safari не перерве інтернет, бо ми ще не викликали вікно завантаження.
      const success = await theoryAutoSend(false);

      // 3. Змінюємо екран на галочку або хрестик
      if (success) {
         loaderContent.innerHTML = '<div class="success-icon">✅</div><div id="loader-text">Успішно відправлено!</div>';
      } else {
         loaderContent.innerHTML = '<div class="success-icon">❌</div><div id="loader-text">Помилка! Збережено лише на планшет.</div>';
      }

      // 4. Робимо мікро-паузу і ТІЛЬКИ ТЕПЕР віддаємо файл на планшет
      setTimeout(() => {
          downloadCSV();
      }, 500);

      // 5. Ховаємо екран через 3 секунди
      setTimeout(() => {
         overlay.style.display = 'none';
      }, 3000);
    }
    // ==========================================

    // ДОДАНО параметр isTrash
    async function theoryAutoSend(isSilent = true, isTrash = false) {
      // Якщо дошок нуль, або це не видалення і ми вже все відправили — ігноруємо
      if (history.length === 0 || (!isTrash && isSilent && history.length === lastSentCount)) return true;
      
      let buyer = document.getElementById('buyer-name').value;
      if (buyer === "") buyer = "Невідомий клієнт"; // Якщо ім'я не вказали, але роблять скидання

      // ЯКЩО ЦЕ ВИДАЛЕННЯ — міняємо назву файлу
      if (isTrash) {
        buyer = "🗑️_СКАСОВАНО_" + buyer;
      }

      const csvContent = formatCSVData();
      const wood = history[0].wood || "Не вказана";
      const backendUrl = "https://script.google.com/macros/s/AKfycbx8Ll5Y8OQPTPSiMQkhw0kD-hrZSFzhD2aRxpWfujatYa__wTjp02GVTAFQZKEXIfg/exec";

      try {
        await fetch(backendUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ data: csvContent, woodName: wood, buyerName: buyer, action: 'syncFileSync' })
        });
        
        // Оновлюємо лічильник тільки якщо це нормальна відправка
        if (!isTrash) lastSentCount = history.length; 
        return true; 
      } catch (error) {
        return false; 
      }
    }

    // --- NEW/MODIFIED: Direct download to tablet with unique name and formatting ---
    function downloadCSV() {
      const buyer = document.getElementById('buyer-name').value;
      const csvContent = formatCSVData();
      
      const date = new Date().toISOString().slice(0, 10);
      const time = new Date().toTimeString().slice(0, 8).replace(/:/g, '-');
      const buyerSafe = buyer.replace(/\s+/g, '_'); // Safe for filename
      
      // Filename format: Zamer_YYYY-MM-DD_BuyerName_HH-MM-SS.csv
      const fileName = `Замір_${date}_${buyerSafe}_${time}.csv`;
      
      const link = document.createElement("a");
      link.setAttribute("href", encodeURI(csvContent));
      link.setAttribute("download", fileName);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
    // ==========================================

    // --- NEW: Helper function to sort history by wood type ---
    function getSortedHistory() {
      return [...history].sort((a, b) => {
        if (a.wood < b.wood) return -1;
        if (a.wood > b.wood) return 1;
        return 0;
      });
    }
    // ==========================================

    // --- NEW: Format CSV data with unique grouping and totals ---
    // --- NEW: Format CSV data with unique grouping and totals ---
    function formatCSVData() {
      const buyer = document.getElementById('buyer-name').value || "Без покупця";
      const sortedHistory = getSortedHistory();
      const date = new Date().toISOString().slice(0, 10);
      const time = new Date().toTimeString().slice(0, 8);
      
      let csvContent = `data:text/csv;charset=utf-8,\uFEFFПокупець: ${buyer}\nДата: ${date},Час: ${time}\n\n`;
      
      let grandVolTotal = 0;
      let grandSumTotal = 0;
      let woodCount = 0;
      
      const groupedData = {};
      sortedHistory.forEach(board => {
        if (!groupedData[board.wood]) groupedData[board.wood] = [];
        groupedData[board.wood].push(board);
      });
      
      const sortedWoods = Object.keys(groupedData).sort();
      
      sortedWoods.forEach(wood => {
        const boards = groupedData[wood];
        let woodVolTotal = 0;
        let woodSumTotal = 0;
        
        csvContent += `Порода: ${wood}\n`;
        // ДОДАНО НОВИЙ СТОВПЧИК: Ціна за куб
        csvContent += "Номер,Довжина (м),Товщина (мм),Ширина (см),Об'єм (м3),Ціна за куб,Сума\n";
        
        woodCount = 0;
        boards.forEach((b, i) => {
          woodCount++;
          let volString = b.vol.toFixed(3); 
          let cubePriceString = Math.round(b.cubePrice || 0).toString(); // Витягуємо ціну за куб
          let priceString = Math.round(b.price).toString();
          
          // ЗАПИСУЄМО НОВЕ ЗНАЧЕННЯ В РЯДОК
          csvContent += `${woodCount},${b.length},${b.thick},${b.width},${volString},${cubePriceString},${priceString}\n`;
          
          woodVolTotal += b.vol;
          woodSumTotal += b.price;
        });
        
        let woodVolString = woodVolTotal.toFixed(3);
        let woodSumString = Math.round(woodSumTotal).toString();
        // ДОДАНА ЗАЙВА КОМА, щоб сума стояла рівно під колонкою "Сума"
        csvContent += `Всього порода: ${wood},,,,${woodVolString},,${woodSumString}\n\n`;
        
        grandVolTotal += woodVolTotal;
        grandSumTotal += woodSumTotal;
      });
      
      let grandVolString = grandVolTotal.toFixed(3);
      let grandSumString = Math.round(grandSumTotal).toString(); 
      // ДОДАНА ЗАЙВА КОМА ТУТ ТАКОЖ
      csvContent += `ЗАГАЛОМ:,,,,${grandVolString},,${grandSumString}\n`;
      
      return csvContent;
    }

   // --- АВТОФОРМАТУВАННЯ ПОЛІВ (м, мм, грн) ---
    function setupFormatting() {
      const fields = [
        { id: 'price', unit: 'грн' },
        { id: 'len', unit: 'м' },
        { id: 'thick', unit: 'мм' }
      ];

      fields.forEach(f => {
        const el = document.getElementById(f.id);
        
        const applyFormat = () => {
          let val = el.value.replace(/[^\d.,]/g, '').trim(); 
          if (val !== '') el.value = val + ' ' + f.unit;
        };

        el.addEventListener('focus', function() {
          this.value = this.value.replace(/[^\d.,]/g, '').trim();
        });

        el.addEventListener('blur', applyFormat);

        // ДОДАНО: Одразу малюємо красиві одиниці виміру при оновленні сторінки
        applyFormat();
      });
    }
    setupFormatting();
    
    // ==========================================
  </script>
